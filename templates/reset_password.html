{% extends "base.html" %}
{% block title %}איפוס סיסמא – Comunication_LTD{% endblock %}

{% block content %}
<div class="card">
  <h2>🔓 איפוס סיסמא</h2>
  <p>הזן את הקוד שקיבלת במייל ואת הסיסמא החדשה שלך.</p>

  <form method="POST">
    <div class="form-group">
      <label for="token">קוד איפוס (SHA-1)</label>
      <input type="text" id="token" name="token" required placeholder="הדבק כאן את הקוד מהמייל" />
    </div>

    <div class="form-group">
      <label for="new_password">סיסמא חדשה</label>
      <input type="password" id="new_password" name="new_password" required placeholder="סיסמא חדשה ומורכבת" />
      <small class="hint">
        לפחות 10 תווים, כולל: אות גדולה, אות קטנה, ספרה ותו מיוחד
      </small>
    </div>

    <button type="submit" class="btn btn-primary">אפס סיסמא</button>
  </form>

  <p class="form-footer">
    <a href="{{ url_for('login') }}">חזרה להתחברות</a>
  </p>
</div>
{% endblock %}
