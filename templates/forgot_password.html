{% extends "base.html" %}
{% block title %}שכחת סיסמא – Comunication_LTD{% endblock %}

{% block content %}
<div class="card">
  <h2>📧 שכחת סיסמא</h2>
  <p>הזן את שם המשתמש שלך ונשלח קוד איפוס למייל הרשום.</p>

  <form method="POST">
    <div class="form-group">
      <label for="username">שם משתמש</label>
      <input type="text" id="username" name="username" required placeholder="שם המשתמש שלך" />
    </div>

    <button type="submit" class="btn btn-primary">שלח קוד איפוס</button>
  </form>

  <p class="form-footer">
    <a href="{{ url_for('login') }}">חזרה להתחברות</a>
  </p>
</div>
{% endblock %}
