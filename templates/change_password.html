{% extends "base.html" %}
{% block title %}שינוי סיסמא – Comunication_LTD{% endblock %}

{% block content %}
<div class="card">
  <h2>🔑 שינוי סיסמא</h2>

  <form method="POST">
    <div class="form-group">
      <label for="current_password">סיסמא נוכחית</label>
      <input type="password" id="current_password" name="current_password" required placeholder="הסיסמא הנוכחית שלך" />
    </div>

    <div class="form-group">
      <label for="new_password">סיסמא חדשה</label>
      <input type="password" id="new_password" name="new_password" required placeholder="סיסמא חדשה" />
      <small class="hint">
        לפחות 10 תווים, כולל: אות גדולה, אות קטנה, ספרה ותו מיוחד
      </small>
    </div>

    <button type="submit" class="btn btn-primary">שנה סיסמא</button>
  </form>

  <p class="form-footer">
    <a href="{{ url_for('system') }}">חזרה למערכת</a>
  </p>
</div>
{% endblock %}
